name: 同步 CSV 資料

on:
  schedule:
    # 每30分鐘執行一次（UTC時間，台灣時間 = UTC+8）
    - cron: '*/30 * * * *'
  workflow_dispatch:  # 允許手動觸發

jobs:
  sync-csv:
    runs-on: ubuntu-latest

    steps:
      - name: 取出 Repository 內容
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 下載最新 CSV
        run: |
          # 從 OneDrive 公開連結下載 CSV
          # ONEDRIVE_URL 是你設定在 GitHub Secrets 的變數
          curl -L "${{ secrets.ONEDRIVE_CSV_URL }}" \
            -H "Accept: text/csv" \
            --max-time 30 \
            --retry 3 \
            -o data.csv

          # 確認檔案有內容
          if [ ! -s data.csv ]; then
            echo "下載的檔案是空的，終止更新"
            exit 1
          fi

          echo "CSV 下載成功，行數：$(wc -l < data.csv)"

      - name: 推送更新到 GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data.csv

          # 只有在 CSV 有變動時才 commit
          if git diff --staged --quiet; then
            echo "資料無變動，略過 commit"
          else
            git commit -m "自動更新資料 $(date '+%Y-%m-%d %H:%M') (UTC)"
            git push
          fi
