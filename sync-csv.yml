name: 同步 CSV 資料

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync-csv:
    runs-on: ubuntu-latest
    steps:
      - name: 取出 Repository 內容
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 下載最新 CSV
        run: |
          curl -L "${{ secrets.ONEDRIVE_CSV_URL }}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/csv,text/plain,*/*" \
            -H "Accept-Language: zh-TW,zh;q=0.9,en;q=0.8" \
            --max-time 60 \
            --retry 3 \
            --retry-delay 5 \
            -o data.csv

          # 確認下載的是 CSV 而不是 HTML 錯誤頁面
          FIRST_LINE=$(head -c 100 data.csv)
          if echo "$FIRST_LINE" | grep -qi "<!DOCTYPE\|<html\|blocked\|error"; then
            echo "❌ 下載到的是 HTML 錯誤頁面，不是 CSV"
            echo "內容前100字：$FIRST_LINE"
            exit 1
          fi

          if [ ! -s data.csv ]; then
            echo "❌ 檔案是空的"
            exit 1
          fi

          echo "✅ 下載成功，行數：$(wc -l < data.csv)"
          echo "前兩行內容："
          head -2 data.csv

      - name: 推送更新到 GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv
          if git diff --staged --quiet; then
            echo "資料無變動，略過 commit"
          else
            git commit -m "自動更新資料 $(date '+%Y-%m-%d %H:%M') (UTC)"
            git push
          fi
