name: 同步 CSV 資料

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync-csv:
    runs-on: ubuntu-latest
    steps:
      - name: 取出 Repository 內容
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 下載最新 CSV
        run: |
          curl -L "${{ secrets.CSV_URL }}" \
            --max-time 30 --retry 3 \
            -o data.csv
          if [ ! -s data.csv ]; then
            echo "檔案是空的"
            exit 1
          fi
          echo "成功，行數：$(wc -l < data.csv)"
          head -2 data.csv

      - name: 推送更新到 GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv
          if git diff --staged --quiet; then
            echo "資料無變動"
          else
            git commit -m "自動更新資料 $(date '+%Y-%m-%d %H:%M')"
            git push
          fi
